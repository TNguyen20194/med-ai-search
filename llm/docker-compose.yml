services:
  # Optional: CPU-only variant
  llm-server-cpu:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    container_name: local-llm-server-cpu
    ports:
      - "8001:8000"
    volumes:
      - ./models:/models:ro
    environment:
      - LLAMA_ARG_MODEL=/models/qwen2.5-7b-instruct-fp16-00001-of-00004.gguf
      - LLAMA_ARG_CTX_SIZE=2048
      - LLAMA_ARG_THREADS=8
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8000
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: "8.0"
    restart: unless-stopped
    profiles:
      - cpu-only 